---
transport_mode: ethernet-only
port_defaults:
  uplink_ports:
    default_mode: port-channel
  uplink_port_channels:
    default:
      - name: default-uplink-pc
        pc_id: 100
        member_ports:
          - "1/41"
          - "1/42"
          - "1/43"
          - "1/44"
        admin_speed: Auto
        fec: Auto
  server_ports:
    recommended_speed: 100G
    default_role: server
supported_port_ranges:
  uplinks:
    - fabric: "1"
      start: 41
      end: 64
  server_ports:
    - fabric: "1"
      start: 1
      end: 40
