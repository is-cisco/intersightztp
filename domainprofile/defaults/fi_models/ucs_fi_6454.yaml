---
transport_mode: ethernet-only
port_defaults:
  uplink_ports:
    default_mode: port-channel
  uplink_port_channels:
    default:
      - name: default-uplink-pc
        pc_id: 100
        member_ports:
          - "1/49"
          - "1/50"
          - "1/51"
          - "1/52"
        admin_speed: Auto
        fec: Auto
  server_ports:
    recommended_speed: 25G
    default_role: server
supported_port_ranges:
  uplinks:
    - fabric: "1"
      start: 49
      end: 54
  server_ports:
    - fabric: "1"
      start: 1
      end: 48
