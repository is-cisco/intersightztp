---
- name: No-op teardown for device readiness validation
  hosts: "{{ group | default('localhost') }}"
  connection: local
  gather_facts: false
  any_errors_fatal: true

  tasks:
    - name: Confirm there is no teardown action for readiness validation
      ansible.builtin.debug:
        msg: Device readiness validation does not create remote resources. No teardown action is required.
      changed_when: false
      tags: [always]
