spec_version: 2
description: Zero-touch onboarding workflow for claiming and preparing Cisco endpoints into Intersight SaaS
inputs:
  agent:
    title: Torque Agent
    description: Torque agent that runs this workflow.
    type: agent
  endpoints_json:
    title: Endpoints JSON
    description: JSON array of target definitions. Use `endpoint` for single targets and `start_ip` plus `end_ip` for ranges.
    type: string
    default: "[]"
  desired_credentials_json:
    title: Desired Endpoint Credentials JSON
    description: JSON array of endpoint credentials used for login, connector preparation, and claim.
    type: string
    default: "[]"
  location:
    title: Location
    description: Optional default location for all targets in this run. Individual targets may override it.
    type: string
    default: ""
  organization:
    title: Intersight Organization
    description: Optional Intersight organization for this onboarding run.
    type: string
    default: ""
  deployment_name:
    title: Deployment Name
    description: Optional deployment name used to tag claimed devices for run traceability.
    type: string
    default: ""
  factory_credentials_json:
    title: Factory Credentials JSON
    description: Advanced. JSON array of factory or first-boot credentials used only when password reset is required.
    type: string
    default: "[]"
  api_key_id:
    title: Intersight API Key ID
    description: Intersight API key ID used for claim submission and verification.
    type: string
    sensitive: true
    default: ""
  api_private_key:
    title: Intersight Private Key
    description: PEM-formatted Intersight API private key content.
    type: string
    sensitive: true
    default: ""
  api_uri:
    title: Intersight API URI
    description: Intersight SaaS API base URI used for validation and claim operations. Hosts ending in `.intersight.com` should use this blueprint.
    type: string
    default: "https://intersight.com/api/v1"
  destroy_behavior:
    title: Destroy Behavior
    description: Advanced. Controls destroy-time behavior for claimed endpoints. Use `noop` to skip cleanup or `unclaim_input_targets` to attempt unclaim.
    type: string
    default: "noop"
    allowed-values: ["noop", "unclaim_input_targets"]
  debug_enabled:
    title: Enable Debug Mode
    description: Advanced. Pass true to enable verbose troubleshooting behavior.
    type: string
    default: "false"
    allowed-values: ["true", "false"]
grains:
  bootstrap_collections:
    kind: ansible
    spec:
      source:
        store: intersightztptest
        path: domainprofile/ansible/bootstrap_collections/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
  validate_target_org:
    kind: ansible
    depends-on: bootstrap_collections
    spec:
      source:
        store: intersightztptest
        path: infraonboarding/ansible/validate_target_org/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
      inputs:
        - organization: '{{ .inputs.organization }}'
        - api_key_id: '{{ .inputs.api_key_id }}'
        - api_private_key: '{{ .inputs.api_private_key }}'
        - api_uri: '{{ .inputs.api_uri }}'
        - validate_certs: 'false'
        - debug_enabled: '{{ .inputs.debug_enabled }}'
      outputs:
        - org_status
        - org_name
        - org_action
        - org_result_json
  asset_discovery:
    kind: ansible
    depends-on: validate_target_org
    spec:
      source:
        store: intersightztptest
        path: infraonboarding/ansible/asset_discovery/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
      inputs:
        - endpoints_json: '{{ .inputs.endpoints_json }}'
        - desired_credentials_json: '{{ .inputs.desired_credentials_json }}'
        - location: '{{ .inputs.location }}'
        - organization: '{{ .grains.validate_target_org.outputs.org_name }}'
        - factory_credentials_json: '{{ .inputs.factory_credentials_json }}'
        - debug_enabled: '{{ .inputs.debug_enabled }}'
      outputs:
        - generated_inventory_yaml
        - generated_inventory_json
        - generated_inventory_endpoints_json
        - discovered_targets_json
        - discovery_results_json
        - total_targets
        - discovered_targets
        - non_intersight_managed_targets
        - failed_targets
  check_and_reset_default_password:
    kind: ansible
    depends-on: asset_discovery
    spec:
      source:
        store: intersightztptest
        path: infraonboarding/ansible/check_and_reset_default_password/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
      inputs:
        - generated_inventory_json: '{{ .grains.asset_discovery.outputs.generated_inventory_json }}'
        - debug_enabled: '{{ .inputs.debug_enabled }}'
      outputs:
        - password_reset_results_json
        - password_reset_ready_endpoints_json
        - password_reset_failed_endpoints_json
        - password_reset_ready_count
        - password_reset_failed_count
  device_connector_prepare:
    kind: ansible
    depends-on: check_and_reset_default_password
    spec:
      source:
        store: intersightztptest
        path: infraonboarding/ansible/device_connector_prepare/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
      inputs:
        - generated_inventory_json: '{{ .grains.asset_discovery.outputs.generated_inventory_json }}'
        - password_reset_ready_endpoints_json: '{{ .grains.check_and_reset_default_password.outputs.password_reset_ready_endpoints_json }}'
        - debug_enabled: '{{ .inputs.debug_enabled }}'
      outputs:
        - connector_prep_results_json
        - prepared_endpoints_json
  claim_to_intersight:
    kind: ansible
    depends-on: device_connector_prepare
    spec:
      source:
        store: intersightztptest
        path: infraonboarding/ansible/claim_to_intersight/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
      inputs:
        - generated_inventory_json: '{{ .grains.asset_discovery.outputs.generated_inventory_json }}'
        - prepared_endpoints_json: '{{ .grains.device_connector_prepare.outputs.prepared_endpoints_json }}'
        - api_key_id: '{{ .inputs.api_key_id }}'
        - api_private_key: '{{ .inputs.api_private_key }}'
        - api_uri: '{{ .inputs.api_uri }}'
        - organization: '{{ .grains.validate_target_org.outputs.org_name }}'
        - deployment_name: '{{ .inputs.deployment_name }}'
        - validate_certs: 'false'
        - debug_enabled: '{{ .inputs.debug_enabled }}'
      outputs:
        - batch_status
        - successful_endpoints
        - failed_endpoints
        - conflict_endpoints
        - non_intersight_managed_targets
        - skipped_endpoints
        - changed_endpoints
        - results_json
    on-destroy:
      - source:
          store: intersightztptest
          path: infraonboarding/ansible/claim_to_intersight/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
        inputs:
          - endpoints_json: '{{ .inputs.endpoints_json }}'
          - desired_credentials_json: '{{ .inputs.desired_credentials_json }}'
          - location: '{{ .inputs.location }}'
          - organization: '{{ .inputs.organization }}'
          - factory_credentials_json: '{{ .inputs.factory_credentials_json }}'
          - api_key_id: '{{ .inputs.api_key_id }}'
          - api_private_key: '{{ .inputs.api_private_key }}'
          - api_uri: '{{ .inputs.api_uri }}'
          - deployment_name: '{{ .inputs.deployment_name }}'
          - validate_certs: 'false'
          - destroy_behavior: '{{ .inputs.destroy_behavior }}'
          - debug_enabled: '{{ .inputs.debug_enabled }}'
outputs:
  batch_status:
    value: '{{ .grains.claim_to_intersight.outputs.batch_status }}'
  successful_endpoints:
    value: '{{ .grains.claim_to_intersight.outputs.successful_endpoints }}'
  failed_endpoints:
    value: '{{ .grains.claim_to_intersight.outputs.failed_endpoints }}'
  conflict_endpoints:
    value: '{{ .grains.claim_to_intersight.outputs.conflict_endpoints }}'
  non_intersight_managed_targets:
    value: '{{ .grains.claim_to_intersight.outputs.non_intersight_managed_targets }}'
  skipped_endpoints:
    value: '{{ .grains.claim_to_intersight.outputs.skipped_endpoints }}'
  changed_endpoints:
    value: '{{ .grains.claim_to_intersight.outputs.changed_endpoints }}'
  results_json:
    value: '{{ .grains.claim_to_intersight.outputs.results_json }}'
