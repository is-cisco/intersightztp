spec_version: 2
description: Cisco Intersight network intent provisioning after domain onboarding
inputs:
  agent:
    type: agent
  api_key_id:
    type: string
    sensitive: true
  api_private_key:
    type: string
    sensitive: true
  api_uri:
    type: string
    default: "https://intersight.com/api/v1"
  deployment_name:
    type: string
  organization:
    type: string
  solution_intent:
    type: string
    default: "default"
    allowed-values: ["default", "flexpod", "virtualization_foundation", "ai_pod"]
  customer_overrides_json:
    type: string
    default: "{}"
  deploy_network_intent_changes:
    type: string
    default: "true"

outputs:
  validations_passed:
    value: '{{ .grains.network_intent_provisioning.outputs.validations_passed }}'
  solution_intent_resolved:
    value: '{{ .grains.network_intent_provisioning.outputs.solution_intent_resolved }}'
  network_intent_payload_json:
    value: '{{ .grains.network_intent_provisioning.outputs.network_intent_payload_json }}'
  onboarding_context_json:
    value: '{{ .grains.network_intent_provisioning.outputs.onboarding_context_json }}'
  intersight_resource_plan_json:
    value: '{{ .grains.network_intent_provisioning.outputs.intersight_resource_plan_json }}'
  vlans_json:
    value: '{{ .grains.network_intent_provisioning.outputs.vlans_json }}'
  vlan_groups_json:
    value: '{{ .grains.network_intent_provisioning.outputs.vlan_groups_json }}'
  uplink_profiles_json:
    value: '{{ .grains.network_intent_provisioning.outputs.uplink_profiles_json }}'
  vlan_policy_vlans_json:
    value: '{{ .grains.network_intent_provisioning.outputs.vlan_policy_vlans_json }}'
  ethernet_network_group_policies_json:
    value: '{{ .grains.network_intent_provisioning.outputs.ethernet_network_group_policies_json }}'
  network_intent_tac_handoff_json:
    value: '{{ .grains.network_intent_provisioning.outputs.network_intent_tac_handoff_json }}'
  intersight_trace_ids_json:
    value: '{{ .grains.network_intent_provisioning.outputs.intersight_trace_ids_json }}'

grains:
  bootstrap_collections:
    kind: ansible
    spec:
      source:
        store: intersightztp
        path: domainprofile/ansible/bootstrap_collections/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
  network_intent_provisioning:
    kind: ansible
    depends-on: bootstrap_collections
    spec:
      source:
        store: intersightztp
        path: domainprofile/ansible/network_intent_provisioning/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
          vars:
            api_key_id: '{{ .inputs.api_key_id }}'
            api_private_key: '{{ .inputs.api_private_key }}'
            api_uri: '{{ .inputs.api_uri }}'
            validate_certs: 'false'
      inputs:
        - deployment_name: '{{ .inputs.deployment_name }}'
        - organization: '{{ .inputs.organization }}'
        - onboarding_payload_json: '{}'
        - solution_intent: '{{ .inputs.solution_intent }}'
        - catalog_solution_key: 'default'
        - customer_overrides_json: '{{ .inputs.customer_overrides_json }}'
        - create_network_intent: 'true'
        - deploy_network_intent_changes: '{{ .inputs.deploy_network_intent_changes }}'
      outputs:
        - validations_passed
        - solution_intent_resolved
        - network_intent_payload_json
        - onboarding_context_json
        - intersight_resource_plan_json
        - vlans_json
        - vlan_groups_json
        - uplink_profiles_json
        - vlan_policy_vlans_json
        - ethernet_network_group_policies_json
        - network_intent_tac_handoff_json
        - intersight_trace_ids_json
      on-destroy:
        source:
          store: intersightztp
          path: domainprofile/ansible/network_intent_provisioning/teardown.yaml
