spec_version: 2

description: Validate requested devices are present in Cisco Intersight and either check readiness once or wait until they become ready.

inputs:
  agent:
    type: agent
    title: Torque Agent
    description: Torque agent that runs this workflow.
  api_key_id:
    type: string
    sensitive: true
    title: Intersight API Key ID
    description: Intersight API key ID used for authentication.
  api_private_key:
    type: string
    sensitive: true
    title: Intersight Private Key
    description: Intersight private key content or a readable file path accepted by the runner.
  api_uri:
    type: string
    title: Intersight API URI
    default: https://intersight.com/api/v1
    description: Optional Intersight API base URI.
  devices_json:
    type: string
    title: Devices JSON
    description: JSON payload describing the devices to validate, including Fabric Interconnect pairs when applicable.
  api_request_timeout:
    type: string
    title: API Request Timeout
    default: "60"
    description: Timeout in seconds for each Intersight API request.
  wait_for_readiness:
    type: string
    title: Wait For Readiness
    default: "false"
    description: Pass true to keep polling until all requested devices are ready or the attempt limit is reached.
    allowed-values: ["true", "false"]
  readiness_poll_interval:
    type: string
    title: Readiness Poll Interval
    default: "30"
    description: Seconds between readiness polls when waiting is enabled.
  readiness_max_attempts:
    type: string
    title: Readiness Max Attempts
    default: "20"
    description: Maximum number of readiness poll attempts when waiting is enabled.
outputs:
  readiness_summary_json:
    value: '{{ .grains.devices_readiness.outputs.readiness_summary_json }}'
  readiness_success:
    value: '{{ .grains.devices_readiness.outputs.readiness_success }}'
  missing_devices_json:
    value: '{{ .grains.devices_readiness.outputs.missing_devices_json }}'
  not_ready_devices_json:
    value: '{{ .grains.devices_readiness.outputs.not_ready_devices_json }}'

grains:
  bootstrap_collections:
    kind: ansible
    spec:
      source:
        store: intersightztptest
        path: domainprofile/ansible/bootstrap_collections/playbook.yaml
      command-arguments: -vvv
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
  devices_readiness:
    kind: ansible
    depends-on: bootstrap_collections
    spec:
      source:
        store: intersightztptest
        path: devicesreadiness/ansible/devices_readiness/playbook.yaml
        # Match the modular repo layout by keeping grains under the product folder and using a concrete playbook path.
      agent:
        name: '{{ .inputs.agent }}'
      inventory-file:
        localhost:
          hosts:
            localhost:
              ansible_connection: local
      inputs:
        - api_key_id: '{{ .inputs.api_key_id }}'
        - api_private_key: '{{ .inputs.api_private_key }}'
        - api_uri: '{{ .inputs.api_uri }}'
        - validate_certs: 'false'
        - devices_json: '{{ .inputs.devices_json }}'
        - api_request_timeout: '{{ .inputs.api_request_timeout }}'
        - wait_for_readiness: '{{ .inputs.wait_for_readiness }}'
        - readiness_poll_interval: '{{ .inputs.readiness_poll_interval }}'
        - readiness_max_attempts: '{{ .inputs.readiness_max_attempts }}'
      outputs:
        - readiness_summary_json
        - readiness_success
        - missing_devices_json
        - not_ready_devices_json
    on-destroy:
      - source:
          store: intersightztptest
          path: devicesreadiness/ansible/devices_readiness/teardown.yaml
        inventory-file:
          localhost:
            hosts:
              localhost:
                ansible_connection: local
