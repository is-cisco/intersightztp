---
- name: Create and deploy rack server profile
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true

  vars:
    deployment_root: "{{ (deployment_yaml | from_yaml) if (deployment_yaml | default('') | string | trim | length > 0) else {} }}"
    deployment_data: "{{ deployment_root.deployment | default(deployment_root) }}"
    platform_root: "{{ (platform_yaml | from_yaml) if (platform_yaml | default('') | string | trim | length > 0) else {} }}"
    platform_data: "{{ platform_root.platform | default(platform_root) }}"
    placement_root: "{{ (placement_yaml | from_yaml) if (placement_yaml | default('') | string | trim | length > 0) else {} }}"
    placement_data: "{{ placement_root.placement | default(placement_root) }}"
    flat_intersight_api_uri: "{{ INTERSIGHT_API_URI | default(lookup('ansible.builtin.env', 'INTERSIGHT_API_URI'), true) | string | trim }}"
    flat_intersight_api_key_id: "{{ INTERSIGHT_API_KEY_ID | default(lookup('ansible.builtin.env', 'INTERSIGHT_API_KEY_ID'), true) | string | trim }}"
    flat_intersight_api_private_key: "{{ INTERSIGHT_API_PRIVATE_KEY | default(lookup('ansible.builtin.env', 'INTERSIGHT_API_PRIVATE_KEY'), true) | string }}"
    flat_intersight_organization_primary: "{{ INTERSIGHT_ORGANIZATION | default(lookup('ansible.builtin.env', 'INTERSIGHT_ORGANIZATION'), true) | string | trim }}"
    flat_intersight_organization_secondary: "{{ INTERSIGHT_ORG | default(lookup('ansible.builtin.env', 'INTERSIGHT_ORG'), true) | string | trim }}"
    flat_mgmt_server_name: "{{ MGMT_SERVER_NAME | default(lookup('ansible.builtin.env', 'MGMT_SERVER_NAME'), true) | string | trim }}"
    flat_mgmt_server_profile_name: "{{ MGMT_SERVER_PROFILE_NAME | default(lookup('ansible.builtin.env', 'MGMT_SERVER_PROFILE_NAME'), true) | string | trim }}"
    flat_mgmt_server_serial: "{{ MGMT_SERVER_SERIAL | default(lookup('ansible.builtin.env', 'MGMT_SERVER_SERIAL'), true) | string | trim }}"
    flat_mgmt_server_moid: "{{ MGMT_SERVER_MOID | default(lookup('ansible.builtin.env', 'MGMT_SERVER_MOID'), true) | string | trim }}"
    flat_mgmt_server_status: "{{ MGMT_SERVER_STATUS | default(lookup('ansible.builtin.env', 'MGMT_SERVER_STATUS'), true) | string | trim }}"
    flat_mgmt_server_model: "{{ MGMT_SERVER_SERVER_MODEL | default(lookup('ansible.builtin.env', 'MGMT_SERVER_SERVER_MODEL'), true) | string | trim }}"
    flat_mgmt_server_ip_address: "{{ MGMT_SERVER_IP_ADDRESS | default(lookup('ansible.builtin.env', 'MGMT_SERVER_IP_ADDRESS'), true) | string | trim }}"
    flat_mgmt_server_subnet_mask: "{{ MGMT_SERVER_SUBNET_MASK | default(lookup('ansible.builtin.env', 'MGMT_SERVER_SUBNET_MASK'), true) | string | trim }}"
    flat_mgmt_server_gateway: "{{ MGMT_SERVER_GATEWAY | default(lookup('ansible.builtin.env', 'MGMT_SERVER_GATEWAY'), true) | string | trim }}"
    flat_mgmt_server_dns_server: "{{ MGMT_SERVER_DNS_SERVER | default(lookup('ansible.builtin.env', 'MGMT_SERVER_DNS_SERVER'), true) | string | trim }}"
    flat_mgmt_server_http_proxy: "{{ MGMT_SERVER_HTTP_PROXY | default(lookup('ansible.builtin.env', 'MGMT_SERVER_HTTP_PROXY'), true) | string | trim }}"
    flat_mgmt_server_https_proxy: "{{ MGMT_SERVER_HTTPS_PROXY | default(lookup('ansible.builtin.env', 'MGMT_SERVER_HTTPS_PROXY'), true) | string | trim }}"
    flat_mgmt_server_no_proxy: "{{ MGMT_SERVER_NO_PROXY | default(lookup('ansible.builtin.env', 'MGMT_SERVER_NO_PROXY'), true) | string | trim }}"
    flat_mgmt_server_hostname: "{{ MGMT_SERVER_HOSTNAME | default(lookup('ansible.builtin.env', 'MGMT_SERVER_HOSTNAME'), true) | string | trim }}"
    flat_mgmt_server_ntp_servers: "{{ MGMT_SERVER_NTP_SERVERS | default(lookup('ansible.builtin.env', 'MGMT_SERVER_NTP_SERVERS'), true) | string | trim }}"
    rack_server_input: "{{ rack_server_json | default('') }}"
    rack_server_root: >-
      {{
        rack_server_input
        if (rack_server_input is mapping)
        else (
          (rack_server_input | from_yaml)
          if (rack_server_input | string | trim | length) > 0
          else {}
        )
      }}
    structured_rack_server_data: "{{ rack_server_root.rack_server | default(rack_server_root) }}"
    flat_rack_server_data:
      name: "{{ flat_mgmt_server_name }}"
      serial: "{{ flat_mgmt_server_serial }}"
      moid: "{{ flat_mgmt_server_moid }}"
      mgmt_ip: "{{ flat_mgmt_server_ip_address }}"
      model: "{{ flat_mgmt_server_model }}"
      hostname: "{{ flat_mgmt_server_hostname }}"
      status: "{{ flat_mgmt_server_status }}"
    rack_server_data: >-
      {{
        structured_rack_server_data
        if (structured_rack_server_data | length > 0)
        else flat_rack_server_data
      }}
    server_profile_input: "{{ server_profile_json | default('') }}"
    server_profile_root: >-
      {{
        server_profile_input
        if (server_profile_input is mapping)
        else (
          (server_profile_input | from_yaml)
          if (server_profile_input | string | trim | length) > 0
          else {}
        )
      }}
    structured_server_profile_data: "{{ server_profile_root.server_profile | default(server_profile_root) }}"
    flat_server_profile_name: "{{ flat_mgmt_server_profile_name if (flat_mgmt_server_profile_name | length > 0) else flat_mgmt_server_name }}"
    flat_server_profile_data:
      name: "{{ flat_server_profile_name }}"
      description: >-
        {{
          'Rack server profile for %s' | format(flat_mgmt_server_name)
          if (flat_mgmt_server_name | length > 0)
          else 'Rack server profile'
        }}
      target_platform: Standalone
      uuid_address_type: NONE
      server_assignment_mode: Static
      deploy_action: ConfigChange
      tags:
        - Key: managed-by
          Value: ansible
        - Key: source
          Value: flat-mgmt-server-input
      user_label: "{{ flat_mgmt_server_hostname }}"
    desired_server_profile: >-
      {{
        structured_server_profile_data
        if (structured_server_profile_data | length > 0)
        else flat_server_profile_data
      }}
    policy_definitions_input: "{{ policy_definitions_json | default('') }}"
    policy_definitions_root: >-
      {{
        policy_definitions_input
        if (policy_definitions_input is sequence and policy_definitions_input is not string)
        else (
          (policy_definitions_input | from_yaml)
          if (policy_definitions_input | string | trim | length) > 0
          else []
        )
      }}
    policy_definitions_data: "{{ policy_definitions_root.policies | default(policy_definitions_root) }}"
    raw_intersight_endpoint: "{{ platform_data.intersight.endpoint | default(flat_intersight_api_uri if (flat_intersight_api_uri | length > 0) else 'https://intersight.com/api/v1') }}"
    normalized_intersight_endpoint: >-
      {{
        raw_intersight_endpoint
        if ((raw_intersight_endpoint | string | regex_search('/api/v1/?$')) is not none)
        else ((raw_intersight_endpoint | string | regex_replace('/+$', '')) ~ '/api/v1')
      }}
    intersight_api_key_id_direct: "{{ platform_data.intersight.credentials.api_key_id | default(flat_intersight_api_key_id) | string | trim }}"
    intersight_api_private_key_direct: "{{ platform_data.intersight.credentials.api_private_key | default(flat_intersight_api_private_key) | string }}"
    intersight_api_key_id_ref: "{{ platform_data.intersight.credentials.api_key_id_ref | default('') }}"
    intersight_api_private_key_ref: "{{ platform_data.intersight.credentials.api_private_key_ref | default('') }}"
    direct_organization: "{{ organization | default('') | string | trim }}"
    requested_organization: >-
      {{
        direct_organization
        if (direct_organization | length > 0)
        else (
          (placement_data.intersight.organization | default('') | string | trim)
          if (placement_data.intersight.organization | default('') | string | trim | length > 0)
          else (
            flat_intersight_organization_primary
            if (flat_intersight_organization_primary | length > 0)
            else flat_intersight_organization_secondary
          )
        )
      }}
    profile_validate_certs: "{{ platform_data.intersight.validate_certs | default(true) | bool }}"
    validation_mode_normalized: "{{ validation_mode | default('strict') | string | trim | lower }}"
    execution_intent_normalized: "{{ execution_intent | default('validate_only') | string | trim | lower }}"
    apply_mode: "{{ (execution_intent_normalized in ['apply', 'deploy', 'provision']) | bool }}"
    run_live_queries: "{{ ((execution_intent_normalized in ['apply', 'deploy', 'provision']) or (validation_mode_normalized == 'live')) | bool }}"
    wait_for_completion_enabled: "{{ ((wait_for_completion | default('true') | string | lower) in ['true', '1', 'yes']) | bool }}"
    torque_export_enabled: "{{ ((enable_torque_exports | default('true') | string | lower) in ['true', '1', 'yes']) | bool }}"
    internal_deployment_delay: "{{ deployment_poll_interval | default('30') | int }}"
    internal_deployment_retries: >-
      {{
        (
          (deployment_timeout_seconds | default('600') | int)
          /
          ((deployment_poll_interval | default('30') | int) | max(1))
        ) | round(0, 'ceil') | int
      }}
    python_bootstrap_enabled: "{{ (bootstrap_python_requirements | default('auto') | string | lower) }}"
    python_bootstrap_should_run: >-
      {{
        true
        if python_bootstrap_enabled == 'true'
        else false
        if python_bootstrap_enabled == 'false'
        else (
          (lookup('ansible.builtin.env', 'TORQUE_WORKSPACE') | string | trim | length) > 0
        )
      }}

  pre_tasks:
    - name: Resolve shared Intersight API key id secret
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../shared/tasks/lib_resolve_secret_value.yaml"
      vars:
        secret_value_direct: "{{ intersight_api_key_id_direct }}"
        secret_value_ref: "{{ intersight_api_key_id_ref }}"
        secret_resolved_fact_name: resolved_api_key_id
        secret_ref_fact_name: resolved_api_key_id_ref_normalized
        secret_env_name_fact_name: resolved_api_key_id_env_name
        secret_file_path_fact_name: resolved_api_key_id_file_path
        secret_source_fact_name: resolved_api_key_id_source
      tags:
        - always
        - precheck

    - name: Resolve shared Intersight API private key secret
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../shared/tasks/lib_resolve_secret_value.yaml"
      vars:
        secret_value_direct: "{{ intersight_api_private_key_direct }}"
        secret_value_ref: "{{ intersight_api_private_key_ref }}"
        secret_resolved_fact_name: resolved_api_private_key
        secret_ref_fact_name: resolved_api_private_key_ref_normalized
        secret_env_name_fact_name: resolved_api_private_key_env_name
        secret_file_path_fact_name: resolved_api_private_key_file_path
        secret_source_fact_name: resolved_api_private_key_source
      tags:
        - always
        - precheck

    - name: Install shared Python requirements
      ansible.builtin.pip:
        requirements: "{{ playbook_dir }}/../requirements.txt"
      when: python_bootstrap_should_run | bool
      tags:
        - always
        - precheck

    - name: Validate rack server profile contract
      ansible.builtin.assert:
        that:
          - rack_server_data is mapping
          - desired_server_profile is mapping
          - >
            (rack_server_data.moid | default('') | string | trim | length > 0)
            or (rack_server_data.serial | default('') | string | trim | length > 0)
            or (rack_server_data.name | default('') | string | trim | length > 0)
          - desired_server_profile.name | default('') | string | trim | length > 0
          - policy_definitions_data is sequence
          - validation_mode_normalized in ['strict', 'live']
          - execution_intent_normalized in ['validate_only', 'apply', 'deploy', 'provision']
          - requested_organization | string | trim | length > 0
        fail_msg: "create-and-deploy-rack-server-profile requires either structured rack_server_json/server_profile_json inputs or flat MGMT_SERVER_* inputs, plus an organization"
      tags:
        - always
        - validate
        - precheck

    - name: Validate live Intersight context when live queries are requested
      ansible.builtin.assert:
        that:
          - resolved_api_key_id | string | trim | length > 0
          - resolved_api_private_key | string | trim | length > 0
        fail_msg: "Live validation or apply mode requires direct, file-backed, or env-backed Intersight API credentials in platform_yaml"
      when: run_live_queries | bool
      tags:
        - always
        - validate
        - precheck

  tasks:
    - name: Initialize normalized policy definition list
      ansible.builtin.set_fact:
        normalized_policy_definitions: []
      tags:
        - always
        - normalize

    - name: Normalize policy definitions
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_normalize_policy_definition.yaml"
      vars:
        current_policy_definition: "{{ item }}"
      loop: "{{ policy_definitions_data | default([]) }}"
      loop_control:
        label: "{{ item.name | default(item.key | default('policy')) }}"
      tags:
        - always
        - normalize

    - name: Initialize rack server profile aggregates
      ansible.builtin.set_fact:
        realized_policy_results: []
        resolved_rack_server: {}
        organization_moid: ""
        current_server_profile_object: {}
        server_profile_current_state: ""
        profile_deploy_needed: false
      tags:
        - always
        - outputs

    - name: Build strict validation policy results
      ansible.builtin.set_fact:
        realized_policy_results: >-
          {{
            normalized_policy_definitions
            | map(
                'combine',
                {
                  'moid': '',
                  'live_found': false,
                  'changed': false,
                  'status': 'planned_only',
                  'desired_ref': {}
                }
              )
            | list
          }}
      when: not (run_live_queries | bool)
      tags:
        - plan
        - outputs

    - name: Look up requested organization by name
      cisco.intersight.intersight_rest_api:
        api_private_key: "{{ resolved_api_private_key }}"
        api_key_id: "{{ resolved_api_key_id }}"
        api_uri: "{{ normalized_intersight_endpoint }}"
        validate_certs: "{{ profile_validate_certs }}"
        resource_path: /organization/Organizations
        query_params:
          $filter: "Name eq '{{ requested_organization }}'"
          $top: 1
        return_list: true
      register: organization_lookup_result
      when: run_live_queries | bool
      tags:
        - live
        - validate

    - name: Validate requested organization exists in Intersight
      ansible.builtin.assert:
        that:
          - (organization_lookup_result.api_response | default([]) | length) > 0
        fail_msg: "Organization {{ requested_organization }} does not exist in Intersight"
      when: run_live_queries | bool
      tags:
        - live
        - validate

    - name: Persist organization Moid
      ansible.builtin.set_fact:
        organization_moid: "{{ ((organization_lookup_result.api_response | default([]) | first).Moid | default('')) }}"
      when: run_live_queries | bool
      tags:
        - live
        - validate

    - name: Resolve rack-server target in live validation or apply mode
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_resolve_rack_server.yaml"
      when: run_live_queries | bool
      tags:
        - live
        - validate
        - configure

    - name: Realize or validate policy definitions against Intersight
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_realize_policy.yaml"
      vars:
        current_policy_definition: "{{ item }}"
      loop: "{{ normalized_policy_definitions | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      when: run_live_queries | bool
      tags:
        - live
        - policies

    - name: Build desired policy attachment references
      ansible.builtin.set_fact:
        desired_policy_attachment_refs: >-
          {{
            (
              realized_policy_results
              | selectattr('attach_to_profile', 'equalto', true)
              | selectattr('moid', 'defined')
              | rejectattr('moid', 'equalto', '')
              | map(attribute='desired_ref')
              | list
            )
            if (run_live_queries | bool)
            else []
          }}
      tags:
        - plan
        - policies

    - name: Reconcile live server profile state
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_reconcile_server_profile.yaml"
      when: run_live_queries | bool
      tags:
        - live
        - profile

    - name: Wait for server-profile deployment when requested
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_wait_for_server_profile.yaml"
      when:
        - apply_mode | bool
        - wait_for_completion_enabled | bool
        - profile_deploy_needed | bool
      tags:
        - live
        - deploy

  post_tasks:
    - name: Build profile summary output contract
      ansible.builtin.set_fact:
        profile_ready: >-
          {{
            'true'
            if (
              (run_live_queries | bool)
              and ((server_profile_current_state | default('')) == 'Associated')
            )
            else 'false'
          }}
        profile_status: >-
          {{
            'planned_only'
            if not (run_live_queries | bool)
            else (
              (
                server_profile_current_state
                if (server_profile_current_state | string | trim | length > 0)
                else 'validated'
              )
            )
          }}
        profile_summary_json: >-
          {{
            {
              'deployment_id': deployment_data.id | default(''),
              'organization': requested_organization,
              'validation_mode': validation_mode_normalized,
              'execution_intent': execution_intent_normalized,
              'rack_server_selector': rack_server_data,
              'rack_server_live': resolved_rack_server | default({}),
              'profile_name': desired_server_profile.name,
              'profile_ready': (
                (run_live_queries | bool)
                and ((server_profile_current_state | default('')) == 'Associated')
              ),
              'profile_status': (
                'planned_only'
                if not (run_live_queries | bool)
                else (
                  server_profile_current_state
                  if (server_profile_current_state | string | trim | length > 0)
                  else 'validated'
                )
              ),
              'policy_count': normalized_policy_definitions | length,
              'attached_policy_count': (
                desired_policy_attachment_refs | default([]) | length
              ),
              'deploy_needed': profile_deploy_needed | default(false) | bool
            } | to_json
          }}
        profile_result_json: >-
          {{
            {
              'organization_moid': organization_moid | default(''),
              'resolved_rack_server': resolved_rack_server | default({}),
              'desired_server_profile': desired_server_profile,
              'current_server_profile': current_server_profile_object | default({}),
              'server_profile_current_state': server_profile_current_state | default(''),
              'profile_deploy_needed': profile_deploy_needed | default(false) | bool,
              'run_live_queries': run_live_queries | bool,
              'apply_mode': apply_mode | bool
            } | to_json
          }}
        policy_results_json: "{{ realized_policy_results | to_json }}"
        realized_policy_moids_json: >-
          {{
            (
              realized_policy_results
              | items2dict(key_name='key', value_name='moid')
            ) | to_json
          }}
      tags:
        - always
        - outputs

    - name: Write optional local output artifacts
      ansible.builtin.copy:
        dest: "{{ local_output_dir }}/{{ item.name }}"
        content: "{{ item.content }}"
        mode: "0600"
      loop:
        - name: rack_server_profile_summary.json
          content: "{{ profile_summary_json }}"
        - name: rack_server_profile_result.json
          content: "{{ profile_result_json }}"
        - name: rack_server_profile_policy_results.json
          content: "{{ policy_results_json }}"
      when: local_output_dir | default('') | string | trim | length > 0
      tags:
        - outputs

    - name: Validate exported rack server profile outputs
      ansible.builtin.assert:
        that:
          - profile_ready is defined
          - profile_status is defined
          - profile_summary_json is defined
          - profile_result_json is defined
          - policy_results_json is defined
          - realized_policy_moids_json is defined
        fail_msg: "create-and-deploy-rack-server-profile did not produce the expected output contract"
      tags:
        - always
        - verify

    - name: Export rack server profile outputs to Torque when enabled
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/lib_export_torque_outputs.yaml"
      when: torque_export_enabled | bool
      tags:
        - always
        - outputs
