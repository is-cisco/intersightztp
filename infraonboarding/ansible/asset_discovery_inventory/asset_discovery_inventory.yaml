---
- name: Build discovery inventory
  hosts: "{{ group | default('localhost') }}"
  connection: local
  gather_facts: false
  any_errors_fatal: true
  vars:
    endpoints_input: "{{ endpoints_json | default('') }}"
    credentials_input: "{{ desired_credentials_json | default('') }}"
    default_credentials_input: "{{ factory_credentials_json | default('[]') }}"
    location_input: "{{ location | default('') }}"
    organization_input: "{{ organization | default('') }}"
    debug_artifact_dir: "/tmp/endpoint_onboarding-debug/asset_discovery_inventory"
  pre_tasks:
    - name: Validate discovery inventory inputs
      ansible.builtin.assert:
        that:
          - endpoints_input | string | trim | length > 0
          - credentials_input | string | trim | length > 0
          - default_credentials_input | string | trim | length > 0
          - debug_enabled | default('false') | string | lower in ['true', 'false']
        fail_msg: "endpoints_json and desired_credentials_json are required"
      tags:
        - always
        - validate
        - precheck
  roles:
    - role: build_inventory
      tags:
        - validate
        - inventory
        - outputs
  post_tasks:
    - name: Ensure discovery inventory debug artifact directory exists
      ansible.builtin.file:
        path: "{{ debug_artifact_dir }}"
        state: directory
        mode: "0700"
      when: debug_enabled | default('false') | bool
      tags:
        - always
        - debug
        - precheck

    - name: Write discovery inventory debug artifact
      ansible.builtin.copy:
        dest: "{{ debug_artifact_dir }}/inventory_debug.json"
        mode: "0600"
        content: |-
          {{
            {
              'generated_inventory_endpoints': (generated_inventory_endpoints_json | from_yaml),
              'endpoint_count': ((generated_inventory_endpoints_json | from_yaml) | length),
              'organization': (organization_input | default(''))
            } | to_nice_json
          }}
      when: debug_enabled | default('false') | bool
      tags:
        - always
        - debug
        - outputs

    - name: Validate discovery inventory outputs
      ansible.builtin.assert:
        that:
          - generated_inventory_yaml is defined
          - generated_inventory_json is defined
          - generated_inventory_endpoints_json is defined
          - generated_inventory_yaml | string | trim | length > 0
          - generated_inventory_json | string | trim | length > 0
          - generated_inventory_endpoints_json | string | trim | length > 0
        fail_msg: "asset_discovery_inventory did not produce the expected outputs"
      tags:
        - always
        - verify

    - name: Export Torque outputs
      torque.collections.export_torque_outputs:
        outputs:
          generated_inventory_yaml: "{{ generated_inventory_yaml }}"
          generated_inventory_json: "{{ generated_inventory_json }}"
          generated_inventory_endpoints_json: "{{ generated_inventory_endpoints_json }}"
      delegate_to: localhost
      run_once: true
      ignore_errors: true
      tags:
        - always
        - outputs
