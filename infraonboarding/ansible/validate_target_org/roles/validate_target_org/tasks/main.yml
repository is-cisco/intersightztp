---
- name: Use default org behavior when no org is requested
  ansible.builtin.set_fact:
    org_status: ready
    org_name: "{{ default_org_name }}"
    org_action: default_org_used
    org_result_json: >-
      {{
        {
          "requested_org_name": role_requested_organization,
          "effective_org_name": default_org_name,
          "org_action": "default_org_used",
          "implementation_state": "validated_default_behavior"
        } | to_json
      }}
  when: role_requested_organization | length == 0

- name: Query requested organization by name
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ role_api_key_id }}"
    api_private_key: "{{ role_api_private_key }}"
    api_uri: "{{ role_api_uri }}"
    validate_certs: "{{ role_validate_certs }}"
    resource_path: "{{ organization_resource_path }}"
    query_params:
      $filter: "Name eq '{{ role_requested_organization }}'"
      $top: 1
    return_list: true
  register: existing_org_query
  no_log: "{{ not (role_debug_enabled | default('false') | bool) }}"
  when: role_requested_organization | length > 0

- name: Create requested organization when missing
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ role_api_key_id }}"
    api_private_key: "{{ role_api_private_key }}"
    api_uri: "{{ role_api_uri }}"
    validate_certs: "{{ role_validate_certs }}"
    resource_path: "{{ organization_resource_path }}"
    update_method: post
    api_body:
      Name: "{{ role_requested_organization }}"
  register: created_org
  no_log: "{{ not (role_debug_enabled | default('false') | bool) }}"
  when:
    - role_requested_organization | length > 0
    - (existing_org_query.api_response | default([]) | length) == 0

- name: Build ensured org result
  ansible.builtin.set_fact:
    org_status: ready
    org_name: "{{ role_requested_organization }}"
    org_action: "{{ 'existing' if (existing_org_query.api_response | default([]) | length) > 0 else 'created' }}"
    org_result_json: >-
      {{
        {
          "requested_org_name": role_requested_organization,
          "effective_org_name": role_requested_organization,
          "org_action": ('existing' if (existing_org_query.api_response | default([]) | length) > 0 else 'created'),
          "existing_match_count": (existing_org_query.api_response | default([]) | length),
          "implementation_state": "validated_with_cisco_intersight_collection"
        } | to_json
      }}
  when: role_requested_organization | length > 0
