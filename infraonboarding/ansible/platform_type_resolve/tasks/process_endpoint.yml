---
- name: Resolve endpoint context
  ansible.builtin.set_fact:
    resolved_endpoint: "{{ inventory_hostname | replace('_', '.') }}"
    ready_endpoint_context: >-
      {{
        (
          password_stage_ready_endpoints
          | selectattr('endpoint', 'equalto', resolved_endpoint)
          | list
          | first
        )
        | default({}, true)
      }}
    prepared_endpoint_context: >-
      {{
        (
          prepared_endpoints
          | selectattr('endpoint', 'equalto', resolved_endpoint)
          | list
          | first
        )
        | default({}, true)
      }}
    resolved_reservation: >-
      {{
        reservation
        | default(Reservation
        | default(generated_inventory_payload.all.vars.reservation
        | default('')))
      }}
    discovery_context: >-
      {{
        (
          discovery_results
          | selectattr('endpoint', 'equalto', resolved_endpoint)
          | list
          | first
        )
        | default({}, true)
      }}

- name: Record endpoint that is not password-ready
  ansible.builtin.set_fact:
    host_platform_resolution_result: "{{ resolution_result }}"
    host_appliance_claim_candidate: {}
  vars:
    resolution_result:
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      device_type: "{{ discovery_context.device_type | default('unknown') }}"
      platform_type: ""
      normalized_claim_key: ""
      status: skipped
      changed: false
      reason: not_ready_after_password_reset
      messages:
        - Host was not marked ready by check_and_reset_default_password
  when: (ready_endpoint_context | length) == 0

- name: Derive platform classification inputs
  ansible.builtin.set_fact:
    resolved_device_type: "{{ discovery_context.device_type | default('unknown') }}"
    resolved_prepared_device_type: "{{ prepared_endpoint_context.device_type | default('') }}"
    resolved_platform_type: >-
      {{
        'IMCRack'
        if ((prepared_endpoint_context.device_type | default(discovery_context.device_type | default(''))) | lower) == 'imc'
        else (
          'UCSFIISM'
          if ((prepared_endpoint_context.device_type | default(discovery_context.device_type | default(''))) | lower) == 'imm'
          else ''
        )
      }}
    resolved_normalized_claim_key: "{{ resolved_endpoint }}"
  when: (ready_endpoint_context | length) > 0

- name: Record endpoint with unresolved platform type
  ansible.builtin.set_fact:
    host_platform_resolution_result: "{{ resolution_result }}"
    host_appliance_claim_candidate: {}
  vars:
    resolution_result:
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      device_type: "{{ resolved_device_type | default('unknown') }}"
      platform_type: ""
      normalized_claim_key: "{{ resolved_normalized_claim_key }}"
      status: failed
      changed: false
      reason: platform_type_unresolved
      messages:
        - "The current discovery contract could not resolve an appliance PlatformType for this endpoint"
  when:
    - (ready_endpoint_context | length) > 0
    - (resolved_platform_type | default('') | string | trim | length) == 0

- name: Record resolved appliance claim candidate
  ansible.builtin.set_fact:
    host_platform_resolution_result: "{{ resolution_result }}"
    host_appliance_claim_candidate: "{{ claim_candidate }}"
  vars:
    effective_prepared_credential:
      username: "{{ prepared_endpoint_context.username | default('') }}"
      password: "{{ prepared_endpoint_context.password | default('') }}"
    effective_desired_credentials: >-
      {{
        desired_credentials
        if ((desired_credentials | default([], true)) | length) > 0
        else inventory_desired_credentials
      }}
    primary_credential: >-
      {{
        effective_prepared_credential
        if (
          (effective_prepared_credential.username | default('') | string | trim | length) > 0
          and (effective_prepared_credential.password | default('') | string | trim | length) > 0
        )
        else ((effective_desired_credentials | first) | default({}, true))
      }}
    claim_candidate:
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      device_type: "{{ resolved_prepared_device_type | default(resolved_device_type | default('unknown'), true) }}"
      platform_type: "{{ resolved_platform_type }}"
      normalized_claim_key: "{{ resolved_normalized_claim_key }}"
      username: "{{ primary_credential.username | default('') }}"
      password: "{{ primary_credential.password | default('') }}"
      reservation: "{{ resolved_reservation }}"
      claim_submission_required: true
    resolution_result:
      endpoint: "{{ resolved_endpoint }}"
      canonical_endpoint: "{{ resolved_endpoint }}"
      device_type: "{{ resolved_prepared_device_type | default(resolved_device_type | default('unknown'), true) }}"
      platform_type: "{{ resolved_platform_type }}"
      normalized_claim_key: "{{ resolved_normalized_claim_key }}"
      status: ready_for_claim
      changed: false
      reason: platform_type_resolved
      messages:
        - "Resolved appliance PlatformType {{ resolved_platform_type }} for this endpoint"
  when:
    - (ready_endpoint_context | length) > 0
    - (resolved_platform_type | default('') | string | trim | length) > 0
