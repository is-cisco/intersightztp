---
- name: Build dynamic inventory for appliance platform resolution
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true
  vars:
    generated_inventory_input: "{{ generated_inventory_json | default('{}') }}"
    generated_inventory_payload: >-
      {{
        generated_inventory_input
        if (generated_inventory_input is not string)
        else (
          (generated_inventory_input | from_yaml)
          if (generated_inventory_input | string | trim | length) > 0
          else {}
        )
      }}
    endpoint_host_items: >-
      {{
        generated_inventory_payload.all.children.endpoints.hosts
        | default({})
        | dict2items
      }}
    password_stage_ready_endpoints_input: "{{ password_reset_ready_endpoints_json | default('[]') }}"
    password_stage_ready_endpoints: >-
      {{
        password_stage_ready_endpoints_input
        if (password_stage_ready_endpoints_input is not string)
        else (
          (password_stage_ready_endpoints_input | from_yaml)
          if (password_stage_ready_endpoints_input | string | trim | length) > 0
          else []
        )
      }}
    prepared_endpoints_input: "{{ prepared_endpoints_json | default('[]') }}"
    prepared_endpoints: >-
      {{
        prepared_endpoints_input
        if (prepared_endpoints_input is not string)
        else (
          (prepared_endpoints_input | from_yaml)
          if (prepared_endpoints_input | string | trim | length) > 0
          else []
        )
      }}
    discovery_results_input: "{{ discovery_results_json | default('[]') }}"
    discovery_results: >-
      {{
        discovery_results_input
        if (discovery_results_input is not string)
        else (
          (discovery_results_input | from_yaml)
          if (discovery_results_input | string | trim | length) > 0
          else []
        )
      }}
    inventory_desired_credentials: "{{ generated_inventory_payload.all.vars.desired_credentials | default([]) }}"
    debug_artifact_dir: "/tmp/endpoint_onboarding-debug/platform_type_resolve"
  pre_tasks:
    - name: Validate platform resolution contract
      ansible.builtin.assert:
        that:
          - generated_inventory_json is defined
          - generated_inventory_payload | type_debug == 'dict'
          - endpoint_host_items | type_debug == 'list'
          - password_stage_ready_endpoints | type_debug == 'list'
          - prepared_endpoints | type_debug == 'list'
          - discovery_results | type_debug == 'list'
        fail_msg: "generated_inventory_json, password_reset_ready_endpoints_json, prepared_endpoints_json, and discovery_results_json must decode to valid values"
      tags:
        - always
        - validate
        - precheck
  tasks:
    - name: Add generated endpoints to dynamic appliance resolution group
      ansible.builtin.add_host:
        name: "{{ endpoint_item.key }}"
        groups: platform_resolution_targets
        endpoint: "{{ endpoint_item.value.endpoint | default(endpoint_item.key) }}"
        reservation: "{{ endpoint_item.value.reservation | default(endpoint_item.value.Reservation | default('')) }}"
      loop: "{{ endpoint_host_items }}"
      loop_control:
        loop_var: endpoint_item
        label: "{{ endpoint_item.value.endpoint | default(endpoint_item.key) }}"
      tags:
        - validate
        - resolve
        - verify
        - aggregate

- name: Resolve appliance platform types per endpoint
  hosts: platform_resolution_targets
  connection: local
  gather_facts: false
  any_errors_fatal: true
  vars:
    generated_inventory_input: "{{ generated_inventory_json | default('{}') }}"
    generated_inventory_payload: >-
      {{
        generated_inventory_input
        if (generated_inventory_input is not string)
        else (
          (generated_inventory_input | from_yaml)
          if (generated_inventory_input | string | trim | length) > 0
          else {}
        )
      }}
    password_stage_ready_endpoints_input: "{{ password_reset_ready_endpoints_json | default('[]') }}"
    password_stage_ready_endpoints: >-
      {{
        password_stage_ready_endpoints_input
        if (password_stage_ready_endpoints_input is not string)
        else (
          (password_stage_ready_endpoints_input | from_yaml)
          if (password_stage_ready_endpoints_input | string | trim | length) > 0
          else []
        )
      }}
    prepared_endpoints_input: "{{ prepared_endpoints_json | default('[]') }}"
    prepared_endpoints: >-
      {{
        prepared_endpoints_input
        if (prepared_endpoints_input is not string)
        else (
          (prepared_endpoints_input | from_yaml)
          if (prepared_endpoints_input | string | trim | length) > 0
          else []
        )
      }}
    discovery_results_input: "{{ discovery_results_json | default('[]') }}"
    discovery_results: >-
      {{
        discovery_results_input
        if (discovery_results_input is not string)
        else (
          (discovery_results_input | from_yaml)
          if (discovery_results_input | string | trim | length) > 0
          else []
        )
      }}
    inventory_desired_credentials: "{{ generated_inventory_payload.all.vars.desired_credentials | default([]) }}"
  tasks:
    - name: Resolve platform type for current endpoint
      ansible.builtin.include_tasks: tasks/process_endpoint.yml
      tags:
        - validate
        - resolve
        - verify
        - aggregate

- name: Aggregate appliance platform resolution outputs
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true
  vars:
    debug_artifact_dir: "/tmp/endpoint_onboarding-debug/platform_type_resolve"
    platform_resolution_target_hosts: "{{ groups['platform_resolution_targets'] | default([]) }}"
    per_host_resolution_results: >-
      {{
        platform_resolution_target_hosts
        | map('extract', hostvars, 'host_platform_resolution_result')
        | reject('equalto', None)
        | reject('equalto', {})
        | list
      }}
    per_host_claim_candidates: >-
      {{
        platform_resolution_target_hosts
        | map('extract', hostvars, 'host_appliance_claim_candidate')
        | reject('equalto', None)
        | reject('equalto', {})
        | list
      }}
  tasks:
    - name: Initialize aggregate platform resolution outputs
      ansible.builtin.set_fact:
        platform_resolution_results: []
        appliance_claim_candidates: []
        seen_claim_target_map: {}
      tags:
        - always
        - outputs

    - name: Append non-ready and unresolved platform results
      ansible.builtin.set_fact:
        platform_resolution_results: "{{ platform_resolution_results + [resolution_result] }}"
      loop: >-
        {{
          per_host_resolution_results
          | rejectattr('status', 'equalto', 'ready_for_claim')
          | list
        }}
      loop_control:
        loop_var: resolution_result
        label: "{{ resolution_result.endpoint | default('missing-endpoint') }}"
      tags:
        - aggregate

    - name: Deduplicate resolved appliance claim candidates
      ansible.builtin.set_fact:
        platform_resolution_results: "{{ platform_resolution_results + [dedup_resolution_result] }}"
        appliance_claim_candidates: "{{ appliance_claim_candidates + ([dedup_claim_candidate] if keep_claim_candidate else []) }}"
        seen_claim_target_map: "{{ seen_claim_target_map | combine({dedup_claim_candidate.normalized_claim_key: dedup_claim_candidate.endpoint}) if keep_claim_candidate else seen_claim_target_map }}"
      vars:
        keep_claim_candidate: "{{ (seen_claim_target_map.get(dedup_claim_candidate.normalized_claim_key, '') | string | trim | length) == 0 }}"
        canonical_endpoint: "{{ seen_claim_target_map.get(dedup_claim_candidate.normalized_claim_key, '') }}"
        source_resolution_result: >-
          {{
            (
              per_host_resolution_results
              | selectattr('endpoint', 'equalto', dedup_claim_candidate.endpoint)
              | list
              | first
            )
            | default({}, true)
          }}
        dedup_resolution_result: >-
          {{
            source_resolution_result
            | combine(
                (
                  {
                    'status': 'skipped',
                    'reason': 'duplicate_logical_target',
                    'canonical_endpoint': canonical_endpoint,
                    'messages': [
                      'Skipped appliance claim candidate generation because this endpoint resolves to the same logical target as ' ~ canonical_endpoint
                    ]
                  }
                  if not keep_claim_candidate
                  else {
                    'canonical_endpoint': dedup_claim_candidate.endpoint
                  }
                ),
                recursive=True
              )
          }}
      loop: "{{ per_host_claim_candidates }}"
      loop_control:
        loop_var: dedup_claim_candidate
        label: "{{ dedup_claim_candidate.endpoint | default('missing-endpoint') }}"
      tags:
        - aggregate

    - name: Export platform resolution aggregate contract
      ansible.builtin.set_fact:
        platform_resolution_results_json: "{{ platform_resolution_results | to_json }}"
        appliance_claim_candidates_json: "{{ appliance_claim_candidates | to_json }}"
      tags:
        - outputs
        - aggregate

    - name: Ensure platform resolution debug artifact directory exists
      ansible.builtin.file:
        path: "{{ debug_artifact_dir }}"
        state: directory
        mode: "0700"
      when: debug_enabled | default('false') | bool
      tags:
        - always
        - debug
        - precheck

    - name: Write platform resolution debug artifact
      ansible.builtin.copy:
        dest: "{{ debug_artifact_dir }}/platform_type_resolve_debug.json"
        mode: "0600"
        content: |-
          {{
            {
              'platform_resolution_results': (platform_resolution_results_json | from_yaml),
              'appliance_claim_candidates': (appliance_claim_candidates_json | from_yaml)
            } | to_nice_json
          }}
      when: debug_enabled | default('false') | bool
      tags:
        - always
        - debug
        - outputs

    - name: Validate platform resolution aggregate outputs
      ansible.builtin.assert:
        that:
          - platform_resolution_results_json is defined
          - appliance_claim_candidates_json is defined
          - platform_resolution_results_json | string | trim | length > 0
          - appliance_claim_candidates_json | string | trim | length > 0
        fail_msg: "platform_type_resolve did not produce the expected aggregate outputs"
      tags:
        - always
        - verify

    - name: Export Torque outputs
      torque.collections.export_torque_outputs:
        outputs:
          platform_resolution_results_json: "{{ platform_resolution_results_json }}"
          appliance_claim_candidates_json: "{{ appliance_claim_candidates_json }}"
      delegate_to: localhost
      run_once: true
      ignore_errors: true
      tags:
        - always
        - outputs
