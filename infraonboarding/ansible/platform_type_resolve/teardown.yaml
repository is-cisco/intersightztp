---
- name: Platform type resolve teardown
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Set noop teardown outputs
      ansible.builtin.set_fact:
        destroy_status: successful
        destroy_results_json: "{{ {'status': 'successful', 'reason': 'noop_destroy_behavior'} | to_json }}"

    - name: Export Torque outputs
      torque.collections.export_torque_outputs:
        outputs:
          destroy_status: "{{ destroy_status }}"
          destroy_results_json: "{{ destroy_results_json }}"
      delegate_to: localhost
      run_once: true
      ignore_errors: true
