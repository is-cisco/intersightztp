---
- name: Run claim role for endpoint
  ansible.builtin.include_role:
    name: claim_device
  vars:
    endpoint: "{{ inventory_hostname | replace('_', '.') }}"
    source_entry_type: "single"
    location: ""
    desired_credentials: "{{ inventory_desired_credentials }}"
    deployment_name: "{{ internal_deployment_name }}"
    organization: "{{ internal_organization }}"
    prepared_targets: "{{ prepared_endpoint_items }}"
    role_api_key_id: "{{ claim_api_key_id }}"
    role_api_private_key: "{{ claim_api_private_key }}"
    role_api_uri: "{{ claim_api_uri }}"
    role_validate_certs: "{{ claim_intersight_validate_certs }}"
    role_debug_enabled: "{{ internal_debug_enabled }}"
    role_debug_artifact_dir: "{{ debug_artifact_dir }}"
    role_endpoint_validate_certs: "{{ claim_endpoint_validate_certs }}"
    role_operation_timeout_seconds: "{{ internal_helper_timeout_seconds }}"
    seen_claim_target_map: "{{ hostvars['localhost'].seen_claim_target_map | default({}) }}"

- name: Collect claim result for endpoint on localhost
  ansible.builtin.set_fact:
    claim_results: "{{ (claim_results | default([])) + [claim_result] }}"
    successful_result_items: >-
      {{ (successful_result_items | default([])) + ([claim_result] if claim_result.status in ['successful', 'submitted', 'already_claimed'] else []) }}
    failed_result_items: >-
      {{ (failed_result_items | default([])) + ([claim_result] if claim_result.status == 'failed' else []) }}
    conflict_result_items: >-
      {{ (conflict_result_items | default([])) + ([claim_result] if claim_result.status == 'conflict' else []) }}
    skipped_result_items: >-
      {{ (skipped_result_items | default([])) + ([claim_result] if claim_result.status == 'skipped' else []) }}
    changed_result_items: >-
      {{ (changed_result_items | default([])) + ([claim_result] if (claim_result.changed | default(false) | bool) else []) }}
    seen_claim_target_map: >-
      {{
        (seen_claim_target_map | default({}))
        | combine(
            (
              {
                (claim_result.normalized_claim_key): (claim_result.canonical_endpoint | default(claim_result.endpoint))
              }
              if (
                (claim_result.normalized_claim_key | default('') | string | trim | length) > 0
                and (claim_result.status | default('')) != 'failed'
                and ((seen_claim_target_map | default({})).get(claim_result.normalized_claim_key | default(''), '') | string | trim | length) == 0
              )
              else {}
            ),
            recursive=True
          )
      }}
  delegate_to: localhost
  delegate_facts: true
