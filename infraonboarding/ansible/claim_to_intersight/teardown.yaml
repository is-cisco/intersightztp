---
- name: Teardown claim to Intersight
  hosts: "{{ group | default('localhost') }}"
  connection: local
  gather_facts: false
  any_errors_fatal: true
  vars:
    teardown_destroy_behavior: "{{ destroy_behavior | default('noop') }}"
    teardown_unclaim_poll_retries: "{{ unclaim_poll_retries | default(24) | int }}"
    teardown_unclaim_poll_delay_seconds: "{{ unclaim_poll_delay_seconds | default(5) | int }}"
    endpoints_input: "{{ endpoints_json | default('') }}"
    credentials_input: "{{ desired_credentials_json | default('') }}"
    default_credentials_input: "{{ factory_credentials_json | default('[]') }}"
  pre_tasks:
    - name: Validate teardown inputs
      ansible.builtin.assert:
        that:
          - teardown_destroy_behavior in ['noop', 'unclaim_input_targets']
          - endpoints_input | string | trim | length > 0
          - credentials_input | string | trim | length > 0
          - default_credentials_input | string | trim | length > 0
          - debug_enabled | default('false') | string | lower in ['true', 'false']
          - teardown_unclaim_poll_retries > 0
          - teardown_unclaim_poll_delay_seconds > 0
        fail_msg: >-
          destroy_behavior must be noop or unclaim_input_targets, endpoints_json and desired_credentials_json must be provided,
          and unclaim poll settings must be positive integers
      tags:
        - always
        - validate
        - precheck

    - name: Validate Intersight teardown credentials when unclaim is requested
      ansible.builtin.assert:
        that:
          - api_key_id is defined
          - api_key_id | string | trim | length > 0
          - api_private_key is defined
          - api_private_key | string | trim | length > 0
        fail_msg: "api_key_id and api_private_key are required when destroy_behavior is unclaim_input_targets"
      when: teardown_destroy_behavior == 'unclaim_input_targets'
      no_log: true
      tags:
        - always
        - validate
        - precheck
  tasks:
    - name: Install shared Python requirements
      ansible.builtin.pip:
        requirements: "{{ playbook_dir }}/../requirements.txt"
      tags:
        - always
        - precheck

    - name: Build teardown inventory contract
      ansible.builtin.command:
        argv:
          - "{{ ansible_playbook_python }}"
          - "{{ playbook_dir }}/../asset_discovery_inventory/tools/run_build_inventory.py"
      environment:
        ENDPOINTS_JSON: "{{ endpoints_input }}"
        CREDENTIALS_JSON: "{{ credentials_input }}"
        DEFAULT_CREDENTIALS_JSON: "{{ default_credentials_input }}"
        LOCATION: "{{ location | default('') }}"
      register: teardown_inventory_contract
      changed_when: false
      when: teardown_destroy_behavior == 'unclaim_input_targets'
      tags:
        - validate
        - teardown

    - name: Parse teardown endpoints
      ansible.builtin.set_fact:
        teardown_target_payload: "{{ teardown_inventory_contract.stdout | from_json }}"
      when: teardown_destroy_behavior == 'unclaim_input_targets'
      tags:
        - validate
        - teardown

    - name: Initialize destroy outputs
      ansible.builtin.set_fact:
        destroy_results: []
      tags:
        - always
        - outputs

    - name: Report conservative no-op teardown behavior
      ansible.builtin.set_fact:
        destroy_results:
          - status: skipped
            reason: noop_destroy_behavior
            messages:
              - claim_to_intersight teardown is configured for noop behavior
      when: teardown_destroy_behavior == 'noop'
      tags:
        - teardown
        - verify

    - name: Resolve device identity for teardown endpoints
      ansible.builtin.command:
        argv:
          - "{{ ansible_playbook_python }}"
          - "{{ playbook_dir }}/tools/run_resolve_device_identity.py"
      environment:
        ENDPOINT: "{{ item.endpoint }}"
        DESIRED_CREDENTIALS_JSON: "{{ item.desired_credentials | default([]) | to_json }}"
        VALIDATE_CERTS: "{{ (endpoint_validate_certs | default(false) | bool) | ternary('true', 'false') }}"
        TIMEOUT: "{{ operation_timeout_seconds | default(20) | string }}"
      loop: "{{ teardown_target_payload.generated_inventory_json.all.children.endpoints.hosts | default({}) | dict2items | map(attribute='value') | list }}"
      loop_control:
        label: "{{ item.endpoint }}"
      register: teardown_identity_results
      changed_when: false
      no_log: "{{ not (debug_enabled | default('false') | bool) }}"
      when: teardown_destroy_behavior == 'unclaim_input_targets'
      tags:
        - teardown
        - verify

    - name: Build destroy identity results
      ansible.builtin.set_fact:
        destroy_identity_results: "{{ teardown_identity_results.results | map(attribute='stdout') | map('from_json') | list }}"
      when: teardown_destroy_behavior == 'unclaim_input_targets'
      tags:
        - teardown
        - verify

    - name: Lookup Intersight registrations for resolved serials
      cisco.intersight.intersight_rest_api:
        api_key_id: "{{ api_key_id }}"
        api_private_key: "{{ api_private_key }}"
        api_uri: "{{ api_uri | default('https://intersight.com/api/v1') }}"
        validate_certs: "{{ validate_certs | default(false) | bool }}"
        resource_path: /asset/DeviceRegistrations
        query_params:
          $filter: "Serial eq '{{ item.serial_number }}'"
        return_list: true
      loop: "{{ destroy_identity_results | default([]) }}"
      loop_control:
        label: "{{ item.endpoint }}"
      when:
        - teardown_destroy_behavior == 'unclaim_input_targets'
        - item.status == 'resolved'
        - (item.serial_number | default('') | string | trim | length) > 0
      register: teardown_registration_lookup_results
      failed_when: false
      no_log: "{{ not (debug_enabled | default('false') | bool) }}"
      tags:
        - teardown
        - verify

    - name: Delete Intersight device claims for resolved serials
      cisco.intersight.intersight_rest_api:
        api_key_id: "{{ api_key_id }}"
        api_private_key: "{{ api_private_key }}"
        api_uri: "{{ api_uri | default('https://intersight.com/api/v1') }}"
        validate_certs: "{{ validate_certs | default(false) | bool }}"
        resource_path: "/asset/DeviceClaims/{{ ((item.api_response | default([]) | first).DeviceClaim.Moid) }}"
        state: absent
      loop: "{{ teardown_registration_lookup_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.endpoint }}"
      when:
        - teardown_destroy_behavior == 'unclaim_input_targets'
        - not (item.failed | default(false) | bool)
        - (item.api_response | default([]) | length) > 0
        - (((item.api_response | default([]) | first).DeviceClaim.Moid | default('') | string | trim | length) > 0)
      register: teardown_device_claim_delete_results
      failed_when: false
      no_log: "{{ not (debug_enabled | default('false') | bool) }}"
      tags:
        - teardown
        - configure

    - name: Poll Intersight registrations after accepted unclaim delete requests
      cisco.intersight.intersight_rest_api:
        api_key_id: "{{ api_key_id }}"
        api_private_key: "{{ api_private_key }}"
        api_uri: "{{ api_uri | default('https://intersight.com/api/v1') }}"
        validate_certs: "{{ validate_certs | default(false) | bool }}"
        resource_path: /asset/DeviceRegistrations
        query_params:
          $filter: "Serial eq '{{ item.item.item.serial_number }}'"
        return_list: true
      loop: "{{ teardown_device_claim_delete_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.item.endpoint }}"
      when:
        - teardown_destroy_behavior == 'unclaim_input_targets'
        - not (item.failed | default(false) | bool)
        - not (
            item.msg is defined and
            (item.msg | string | trim | length) > 0 and
            (
              'UnauthorizedOperation' in (item.msg | string) or
              'HTTP Error 403' in (item.msg | string) or
              'Insufficient privileges' in (item.msg | string)
            )
          )
      register: teardown_post_delete_registration_checks
      until: >-
        (teardown_post_delete_registration_checks.api_response | default([]) | length) == 0 or
        ((((teardown_post_delete_registration_checks.api_response | default([]) | first).DeviceClaim.Moid | default('') | string | trim | length) == 0))
      retries: "{{ teardown_unclaim_poll_retries }}"
      delay: "{{ teardown_unclaim_poll_delay_seconds }}"
      failed_when: false
      changed_when: false
      no_log: "{{ not (debug_enabled | default('false') | bool) }}"
      tags:
        - teardown
        - verify

    - name: Collect unresolved teardown endpoints
      ansible.builtin.set_fact:
        destroy_results: "{{ destroy_results + [ {
          'endpoint': item.endpoint,
          'status': 'failed',
          'changed': false,
          'reason': item.reason | default('device_identity_lookup_failed'),
          'messages': item.messages | default([])
        } ] }}"
      loop: "{{ destroy_identity_results | default([]) }}"
      loop_control:
        label: "{{ item.endpoint }}"
      when:
        - teardown_destroy_behavior == 'unclaim_input_targets'
        - item.status != 'resolved' or (item.serial_number | default('') | string | trim | length) == 0
      tags:
        - teardown
        - outputs

    - name: Collect registration lookup failures
      ansible.builtin.set_fact:
        destroy_results: "{{ destroy_results + [ {
          'endpoint': item.item.endpoint,
          'serial_number': item.item.serial_number,
          'status': 'failed',
          'changed': false,
          'reason': 'registration_lookup_failed',
          'messages': [ item.msg | string ]
        } ] }}"
      loop: "{{ teardown_registration_lookup_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.endpoint }}"
      when:
        - teardown_destroy_behavior == 'unclaim_input_targets'
        - item.failed | default(false) | bool
      tags:
        - teardown
        - outputs
