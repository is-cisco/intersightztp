---
- name: Check and reset default password
  hosts: "{{ group | default('localhost') }}"
  connection: local
  gather_facts: false
  any_errors_fatal: true
  vars:
    generated_inventory_input: "{{ generated_inventory_json | default('{}') }}"
    generated_inventory_payload: >-
      {{
        generated_inventory_input
        if (generated_inventory_input is not string)
        else (
          (generated_inventory_input | from_yaml)
          if (generated_inventory_input | string | trim | length) > 0
          else {}
        )
      }}
    endpoint_host_items: >-
      {{
        generated_inventory_payload.all.children.endpoints.hosts
        | default({})
        | dict2items
      }}
    inventory_desired_credentials: "{{ generated_inventory_payload.all.vars.desired_credentials | default([]) }}"
    inventory_default_credentials: "{{ generated_inventory_payload.all.vars.default_credentials | default([]) }}"
    debug_artifact_dir: "/tmp/endpoint_onboarding-debug/check_and_reset_default_password"
  pre_tasks:
    - name: Validate generated inventory input
      ansible.builtin.assert:
        that:
          - generated_inventory_json is defined
          - generated_inventory_payload | type_debug == 'dict'
          - endpoint_host_items | type_debug == 'list'
        fail_msg: "generated_inventory_json must decode to a generated inventory with endpoints hosts"
      tags:
        - always
        - validate
        - precheck
  tasks:
    - name: Initialize aggregated password reset outputs
      ansible.builtin.set_fact:
        password_reset_results: []
        password_reset_ready_endpoints: []
        password_reset_failed_endpoints: []
      tags:
        - always
        - outputs

    - name: Run password reset helper for generated endpoints
      ansible.builtin.command:
        argv:
          - "{{ ansible_playbook_python }}"
          - "{{ playbook_dir }}/tools/run_reset_default_password.py"
      environment:
        ENDPOINT: "{{ item.value.endpoint | default(item.value.ansible_host | default(item.key)) }}"
        DESIRED_CREDENTIALS_JSON: "{{ item.value.desired_credentials | default(inventory_desired_credentials) | to_json }}"
        DEFAULT_CREDENTIALS_JSON: "{{ item.value.default_credentials | default(inventory_default_credentials) | to_json }}"
        VALIDATE_CERTS: "{{ (validate_certs | default(false) | bool) | ternary('true', 'false') }}"
        TIMEOUT: "{{ operation_timeout_seconds | default(20) | string }}"
      loop: "{{ endpoint_host_items }}"
      loop_control:
        label: "{{ item.value.endpoint | default(item.key) }}"
      register: password_reset_helper_results
      changed_when: false
      no_log: "{{ not (debug_enabled | default('false') | bool) }}"
      tags:
        - validate
        - reset
        - verify

    - name: Collect password reset results from helper output
      ansible.builtin.set_fact:
        password_reset_results: "{{ password_reset_results + [host_result] }}"
        password_reset_ready_endpoints: >-
          {{
            password_reset_ready_endpoints
            + ([ready_target] if host_result.status in ['ready', 'changed'] else [])
          }}
        password_reset_failed_endpoints: >-
          {{
            password_reset_failed_endpoints
            + ([failed_target] if host_result.status not in ['ready', 'changed'] else [])
          }}
      vars:
        host_result: "{{ item.stdout | from_json }}"
        ready_target:
          endpoint: "{{ host_result.endpoint | default(item.item.value.endpoint | default(item.item.key)) }}"
          status: "{{ host_result.status }}"
          changed: "{{ host_result.changed | default(false) }}"
        failed_target:
          endpoint: "{{ host_result.endpoint | default(item.item.value.endpoint | default(item.item.key)) }}"
          status: "{{ host_result.status }}"
          reason: "{{ host_result.reason | default('unknown') }}"
          changed: "{{ host_result.changed | default(false) }}"
      loop: "{{ password_reset_helper_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.value.endpoint | default(item.item.key) }}"
      tags:
        - outputs
        - aggregate

    - name: Export password reset aggregate contract
      ansible.builtin.set_fact:
        password_reset_results_json: "{{ password_reset_results | to_json }}"
        password_reset_ready_endpoints_json: "{{ password_reset_ready_endpoints | to_json }}"
        password_reset_failed_endpoints_json: "{{ password_reset_failed_endpoints | to_json }}"
        password_reset_ready_count: "{{ password_reset_ready_endpoints | length | string }}"
        password_reset_failed_count: "{{ password_reset_failed_endpoints | length | string }}"
      tags:
        - outputs
        - aggregate

    - name: Ensure password reset debug artifact directory exists
      ansible.builtin.file:
        path: "{{ debug_artifact_dir }}"
        state: directory
        mode: "0700"
      when: debug_enabled | default('false') | bool
      tags:
        - always
        - debug
        - precheck

    - name: Write password reset debug artifact
      ansible.builtin.copy:
        dest: "{{ debug_artifact_dir }}/password_reset_debug.json"
        mode: "0600"
        content: |-
          {{
            {
              'password_reset_results': (password_reset_results_json | from_yaml),
              'password_reset_ready_endpoints': (password_reset_ready_endpoints_json | from_yaml),
              'password_reset_failed_endpoints': (password_reset_failed_endpoints_json | from_yaml)
            } | to_nice_json
          }}
      when: debug_enabled | default('false') | bool
      tags:
        - always
        - debug
        - outputs

    - name: Validate password reset aggregate outputs
      ansible.builtin.assert:
        that:
          - password_reset_results_json is defined
          - password_reset_ready_endpoints_json is defined
          - password_reset_failed_endpoints_json is defined
          - password_reset_ready_count is defined
          - password_reset_failed_count is defined
        fail_msg: "check_and_reset_default_password did not produce the expected aggregate outputs"
      tags:
        - always
        - verify

    - name: Export Torque outputs
      torque.collections.export_torque_outputs:
        outputs:
          password_reset_results_json: "{{ password_reset_results_json }}"
          password_reset_ready_endpoints_json: "{{ password_reset_ready_endpoints_json }}"
          password_reset_failed_endpoints_json: "{{ password_reset_failed_endpoints_json }}"
          password_reset_ready_count: "{{ password_reset_ready_count }}"
          password_reset_failed_count: "{{ password_reset_failed_count }}"
      delegate_to: localhost
      run_once: true
      ignore_errors: true
      tags:
        - always
        - outputs
