---
- name: Determine whether host is ready for connector preparation
  ansible.builtin.set_fact:
    host_ready_for_connector_prepare: >-
      {{
        (ready_targets | selectattr('endpoint', 'equalto', (endpoint | default(inventory_hostname))) | list | length > 0)
      }}

- name: Skip connector preparation when host is not ready
  ansible.builtin.set_fact:
    connector_prepare_result:
      endpoint: "{{ endpoint | default(inventory_hostname) }}"
      status: skipped
      changed: false
      reason: not_ready_after_password_stage
      messages:
        - Host was not marked ready by check_and_reset_default_password
    prepared_target_result: {}
  when: not host_ready_for_connector_prepare

- name: Run connector preparation helper for current host
  ansible.builtin.command:
    argv:
      - "{{ ansible_playbook_python }}"
      - "{{ playbook_dir }}/tools/run_prepare_connector.py"
  environment:
    ENDPOINT: "{{ endpoint | default(inventory_hostname) }}"
    SOURCE_ENTRY_TYPE: "{{ source_entry_type | default('single') }}"
    LOCATION: "{{ location | default('') }}"
    DESIRED_CREDENTIALS_JSON: "{{ desired_credentials | to_json }}"
    VALIDATE_CERTS: "{{ (role_validate_certs | default(false) | bool) | ternary('true', 'false') }}"
    TIMEOUT: "{{ role_operation_timeout_seconds | default(20) | string }}"
  register: connector_prepare_helper_result
  changed_when: (connector_prepare_helper_result.stdout | from_json).result.changed | default(false) | bool
  no_log: "{{ not (role_debug_enabled | default('false') | bool) }}"
  when: host_ready_for_connector_prepare

- name: Parse connector preparation helper payload
  ansible.builtin.set_fact:
    connector_prepare_payload: "{{ connector_prepare_helper_result.stdout | from_json }}"
  when: host_ready_for_connector_prepare

- name: Export connector preparation helper facts
  ansible.builtin.set_fact:
    connector_prepare_result: "{{ connector_prepare_payload.result }}"
    prepared_target_result: "{{ connector_prepare_payload.prepared_target | default({}) }}"
  when: host_ready_for_connector_prepare

- name: Ensure connector preparation helper debug artifact directory exists
  ansible.builtin.file:
    path: "{{ role_debug_artifact_dir | default('/tmp/endpoint_onboarding-debug/device_connector_prepare') }}"
    state: directory
    mode: "0700"
  when:
    - host_ready_for_connector_prepare
    - role_debug_enabled | default('false') | bool

- name: Write connector preparation helper debug artifact
  ansible.builtin.copy:
    dest: "{{ role_debug_artifact_dir | default('/tmp/endpoint_onboarding-debug/device_connector_prepare') }}/{{ (endpoint | default(inventory_hostname)) | replace('/', '_') }}_helper.json"
    mode: "0600"
    content: "{{ connector_prepare_payload | to_nice_json }}"
  when:
    - host_ready_for_connector_prepare
    - role_debug_enabled | default('false') | bool
