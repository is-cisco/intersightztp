---
- name: Run connector preparation role for endpoint
  ansible.builtin.include_role:
    name: prepare_connector
  vars:
    endpoint: "{{ inventory_hostname | replace('_', '.') }}"
    source_entry_type: "single"
    location: ""
    desired_credentials: "{{ inventory_desired_credentials }}"
    ready_targets: "{{ password_stage_ready_endpoints }}"
    role_debug_enabled: "{{ internal_debug_enabled }}"
    role_debug_artifact_dir: "{{ debug_artifact_dir }}"
    role_validate_certs: false
    role_operation_timeout_seconds: "{{ internal_helper_timeout_seconds }}"

- name: Collect connector preparation result for endpoint
  ansible.builtin.set_fact:
    host_connector_prep_result: "{{ connector_prepare_result }}"
    host_prepared_target_result: >-
      {{
        prepared_target_result
        if ((prepared_target_result | default({}) | type_debug == 'dict') and ((prepared_target_result | default({}) | length) > 0) and connector_prepare_result.status == 'ready_for_claim')
        else {}
      }}
