---
- name: Build dynamic inventory for appliance claims
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true
  vars:
    appliance_claim_candidates_input: "{{ appliance_claim_candidates_json | default('[]') }}"
    appliance_claim_candidates: >-
      {{
        appliance_claim_candidates_input
        if (appliance_claim_candidates_input is not string)
        else (
          (appliance_claim_candidates_input | from_yaml)
          if (appliance_claim_candidates_input | string | trim | length) > 0
          else []
        )
      }}
    claim_api_uri: "{{ api_uri | default('') }}"
    claim_validate_certs: "{{ validate_certs | default(false) | bool }}"
    internal_debug_enabled: "{{ debug_enabled | default('false') }}"
    debug_artifact_dir: "/tmp/endpoint_onboarding-debug/claim_to_appliance"
  pre_tasks:
    - name: Validate appliance claim contract
      ansible.builtin.assert:
        that:
          - appliance_claim_candidates | type_debug == 'list'
          - api_key_id is defined
          - api_key_id | string | trim | length > 0
          - api_private_key is defined
          - api_private_key | string | trim | length > 0
          - claim_api_uri | string | trim | length > 0
        fail_msg: "appliance_claim_candidates_json, api_key_id, api_private_key, and api_uri are required for appliance claim"
      no_log: "{{ not (debug_enabled | default('false') | bool) }}"
      tags:
        - always
        - validate
        - precheck
  tasks:
    - name: Add appliance claim candidates to dynamic host group
      ansible.builtin.add_host:
        name: "{{ appliance_claim_candidate.endpoint | default('missing-endpoint') }}"
        groups: appliance_claim_targets
        endpoint: "{{ appliance_claim_candidate.endpoint | default('') }}"
        canonical_endpoint: "{{ appliance_claim_candidate.canonical_endpoint | default(appliance_claim_candidate.endpoint | default('')) }}"
        device_type: "{{ appliance_claim_candidate.device_type | default('unknown') }}"
        platform_type: "{{ appliance_claim_candidate.platform_type | default('') }}"
        normalized_claim_key: "{{ appliance_claim_candidate.normalized_claim_key | default(appliance_claim_candidate.endpoint | default('')) }}"
        username: "{{ appliance_claim_candidate.username | default('') }}"
        password: "{{ appliance_claim_candidate.password | default('') }}"
        reservation: "{{ appliance_claim_candidate.reservation | default('') }}"
      loop: "{{ appliance_claim_candidates }}"
      loop_control:
        loop_var: appliance_claim_candidate
        label: "{{ appliance_claim_candidate.endpoint | default('missing-endpoint') }}"
      tags:
        - validate
        - claim
        - verify
        - aggregate

- name: Claim targets into Intersight appliance per endpoint
  hosts: appliance_claim_targets
  connection: local
  gather_facts: false
  any_errors_fatal: true
  vars:
    claim_api_uri: "{{ api_uri | default('') }}"
    claim_validate_certs: "{{ validate_certs | default(false) | bool }}"
  tasks:
    - name: Process appliance claim candidate
      ansible.builtin.include_tasks: tasks/process_endpoint.yml
      tags:
        - validate
        - claim
        - verify
        - aggregate

- name: Aggregate appliance claim outputs
  hosts: localhost
  connection: local
  gather_facts: false
  any_errors_fatal: true
  vars:
    claim_api_uri: "{{ api_uri | default('') }}"
    claim_validate_certs: "{{ validate_certs | default(false) | bool }}"
    appliance_claim_target_hosts: "{{ groups['appliance_claim_targets'] | default([]) }}"
    claim_results: >-
      {{
        appliance_claim_target_hosts
        | map('extract', hostvars, 'host_claim_result')
        | reject('equalto', None)
        | reject('equalto', {})
        | list
      }}
    debug_artifact_dir: "/tmp/endpoint_onboarding-debug/claim_to_appliance"
  tasks:
    - name: Initialize appliance claim aggregate outputs
      ansible.builtin.set_fact:
        device_claim_result_items: []
        workflow_result_items: []
        successful_result_items: []
        failed_result_items: []
        conflict_result_items: []
        skipped_result_items: []
        changed_result_items: []
      tags:
        - always
        - outputs

    - name: Wait briefly for appliance workflows to appear
      ansible.builtin.pause:
        seconds: 15
      when: >-
        {{
          (
            claim_results
            | selectattr('status', 'equalto', 'submitted')
            | list
            | length
          ) > 0
        }}
      tags:
        - verify
        - aggregate

    - name: Query workflow records for submitted appliance claims
      ansible.builtin.include_tasks: tasks/process_workflow.yml
      loop: >-
        {{
          claim_results
          | selectattr('status', 'equalto', 'submitted')
          | list
        }}
      loop_control:
        loop_var: submitted_claim_result
        label: "{{ submitted_claim_result.endpoint | default('missing-endpoint') }}"
      tags:
        - verify
        - aggregate

    - name: Query DeviceClaims records for submitted appliance claims
      ansible.builtin.include_tasks: tasks/process_device_claim.yml
      loop: >-
        {{
          claim_results
          | selectattr('status', 'equalto', 'submitted')
          | list
        }}
      loop_control:
        loop_var: submitted_claim_result
        label: "{{ submitted_claim_result.endpoint | default('missing-endpoint') }}"
      tags:
        - verify
        - aggregate

    - name: Initialize enriched appliance results
      ansible.builtin.set_fact:
        enriched_claim_results: []
      tags:
        - verify
        - aggregate

    - name: Enrich appliance claim results with latest workflow summary
      ansible.builtin.include_tasks: tasks/process_result_enrichment.yml
      loop: "{{ claim_results }}"
      loop_control:
        loop_var: result_item
        label: "{{ result_item.endpoint | default('missing-endpoint') }}"
      tags:
        - verify
        - aggregate

    - name: Rebuild appliance aggregate buckets from enriched results
      ansible.builtin.set_fact:
        successful_result_items: >-
          {{
            enriched_claim_results
            | selectattr('status', 'in', ['submitted', 'already_claimed'])
            | list
          }}
        failed_result_items: >-
          {{
            enriched_claim_results
            | selectattr('status', 'equalto', 'failed')
            | list
          }}
        conflict_result_items: >-
          {{
            enriched_claim_results
            | selectattr('status', 'equalto', 'conflict')
            | list
          }}
        skipped_result_items: >-
          {{
            enriched_claim_results
            | selectattr('status', 'equalto', 'skipped')
            | list
          }}
        changed_result_items: >-
          {{
            enriched_claim_results
            | selectattr('changed', 'equalto', true)
            | list
          }}
      tags:
        - verify
        - aggregate

    - name: Export appliance claim aggregate contract
      ansible.builtin.set_fact:
        batch_status: "{{ 'failed' if (failed_result_items | length) > 0 else 'successful' }}"
        successful_endpoints: "{{ successful_result_items | length | string }}"
        failed_endpoints: "{{ failed_result_items | length | string }}"
        conflict_endpoints: "{{ conflict_result_items | length | string }}"
        skipped_endpoints: "{{ skipped_result_items | length | string }}"
        changed_endpoints: "{{ changed_result_items | length | string }}"
        non_intersight_managed_targets: "0"
        results_json: "{{ enriched_claim_results | to_json }}"
        workflow_results_json: "{{ workflow_result_items | to_json }}"
      tags:
        - outputs
        - aggregate

    - name: Ensure appliance claim debug artifact directory exists
      ansible.builtin.file:
        path: "{{ debug_artifact_dir }}"
        state: directory
        mode: "0700"
      when: debug_enabled | default('false') | bool
      tags:
        - always
        - debug
        - precheck

    - name: Write appliance claim debug artifact
      ansible.builtin.copy:
        dest: "{{ debug_artifact_dir }}/claim_to_appliance_debug.json"
        mode: "0600"
        content: |-
          {{
            {
              'results': (results_json | from_yaml),
              'successful_result_items': successful_result_items,
              'failed_result_items': failed_result_items,
              'conflict_result_items': conflict_result_items,
              'skipped_result_items': skipped_result_items,
              'changed_result_items': changed_result_items,
              'device_claim_result_items': device_claim_result_items,
              'workflow_result_items': workflow_result_items
            } | to_nice_json
          }}
      when: debug_enabled | default('false') | bool
      tags:
        - always
        - debug
        - outputs

    - name: Validate appliance claim aggregate outputs
      ansible.builtin.assert:
        that:
          - batch_status is defined
          - successful_endpoints is defined
          - failed_endpoints is defined
          - conflict_endpoints is defined
          - skipped_endpoints is defined
          - changed_endpoints is defined
          - non_intersight_managed_targets is defined
          - results_json is defined
          - workflow_results_json is defined
          - results_json | string | trim | length > 0
        fail_msg: "claim_to_appliance did not produce the expected aggregate outputs"
      tags:
        - always
        - verify

    - name: Export Torque outputs
      torque.collections.export_torque_outputs:
        outputs:
          batch_status: "{{ batch_status }}"
          successful_endpoints: "{{ successful_endpoints }}"
          failed_endpoints: "{{ failed_endpoints }}"
          conflict_endpoints: "{{ conflict_endpoints }}"
          non_intersight_managed_targets: "{{ non_intersight_managed_targets }}"
          skipped_endpoints: "{{ skipped_endpoints }}"
          changed_endpoints: "{{ changed_endpoints }}"
          results_json: "{{ results_json }}"
          workflow_results_json: "{{ workflow_results_json }}"
      delegate_to: localhost
      run_once: true
      ignore_errors: true
      tags:
        - always
        - outputs
