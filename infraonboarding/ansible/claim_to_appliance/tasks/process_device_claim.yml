---
- name: Query appliance DeviceClaims records for submitted endpoint
  cisco.intersight.intersight_rest_api:
    api_key_id: "{{ api_key_id }}"
    api_private_key: "{{ api_private_key }}"
    api_uri: "{{ claim_api_uri }}"
    validate_certs: "{{ claim_validate_certs }}"
    resource_path: /appliance/DeviceClaims
    query_params:
      $filter: "Hostname eq '{{ submitted_claim_result.endpoint }}'"
      $orderby: CreateTime desc
      $top: 5
    return_list: true
  register: appliance_device_claim_check
  failed_when: false
  no_log: "{{ not (debug_enabled | default('false') | bool) }}"

- name: Collect appliance DeviceClaims result
  ansible.builtin.set_fact:
    device_claim_result_items: "{{ device_claim_result_items + [device_claim_result] }}"
  vars:
    device_claim_api_results: "{{ appliance_device_claim_check.api_response | default([]) }}"
    sorted_device_claim_results: "{{ device_claim_api_results | sort(attribute='CreateTime', reverse=true) }}"
    latest_device_claim: "{{ (sorted_device_claim_results | first) if (sorted_device_claim_results | length) > 0 else {} }}"
    device_claim_result:
      endpoint: "{{ submitted_claim_result.endpoint }}"
      canonical_endpoint: "{{ submitted_claim_result.canonical_endpoint | default(submitted_claim_result.endpoint) }}"
      normalized_claim_key: "{{ submitted_claim_result.normalized_claim_key | default(submitted_claim_result.endpoint) }}"
      device_claim_found: "{{ (device_claim_api_results | length) > 0 }}"
      device_claim_count: "{{ device_claim_api_results | length }}"
      device_claim_statuses: "{{ sorted_device_claim_results | map(attribute='Status') | list if (sorted_device_claim_results | length) > 0 else [] }}"
      latest_device_claim_moid: "{{ latest_device_claim.Moid | default('') }}"
      latest_device_claim_status: "{{ latest_device_claim.Status | default('') }}"
      latest_device_claim_create_time: "{{ latest_device_claim.CreateTime | default('') }}"
      latest_device_claim_mod_time: "{{ latest_device_claim.ModTime | default('') }}"
      latest_device_claim_device_id: "{{ latest_device_claim.DeviceId | default('') }}"
      latest_device_claim_platform_type: "{{ latest_device_claim.PlatformType | default('') }}"
      latest_device_claim_message: "{{ latest_device_claim.Message | default('') }}"
      latest_device_claim_response: "{{ latest_device_claim }}"
      device_claim_response: "{{ device_claim_api_results }}"
      messages:
        - >-
          {%- if (device_claim_api_results | length) > 0 -%}
          Found {{ device_claim_api_results | length }} matching DeviceClaims record(s) for endpoint {{ submitted_claim_result.endpoint }}. Using the newest claim {{ latest_device_claim.Moid | default('') }} with status {{ latest_device_claim.Status | default('unknown') }}.
          {%- else -%}
          No matching DeviceClaims records were found yet for endpoint {{ submitted_claim_result.endpoint }}.
          {%- endif -%}
